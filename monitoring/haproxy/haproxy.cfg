# Reverse proxy HAProxy — terminaison TLS + SSO Entra ID (oauth2-proxy)
global
    log stdout format raw daemon
    maxconn 4000
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tlsv12

defaults
    mode http
    option httplog
    timeout connect 10s
    timeout client 1m
    timeout server 1m

frontend http_redirect
    bind *:80
    http-request redirect scheme https code 301

frontend supervision_https
    bind *:443 ssl crt /etc/ssl/private/supervision.althea-systems.fr.pem
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains"
    http-response set-header X-Frame-Options DENY
    acl is_grafana path_beg /grafana
    acl is_zabbix  path_beg /zabbix
    use_backend grafana_back if is_grafana
    use_backend zabbix_back  if is_zabbix
    default_backend grafana_back

backend grafana_back
    server grafana grafana:3000 check
backend zabbix_back
    server zabbix-web zabbix-web:8080 check
