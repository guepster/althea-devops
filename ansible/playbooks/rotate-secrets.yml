---
# Rotation automatique des secrets applicatifs (orchestrée par AWX)
- name: "Rotation - Client secrets applications Entra ID"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vault/prod.yml
  tasks:
    - name: "Générer le nouveau secret côté Entra ID"
      ansible.builtin.command: >
        az ad app credential reset --id {{ item.app_object_id }} --years 1 --append
      loop: "{{ apps_to_rotate }}"
      register: new_secrets

    - name: "Stocker le nouveau secret dans Key Vault (avec expiration)"
      ansible.builtin.command: >
        az keyvault secret set --vault-name alt-prod-kv-fr-01
        --name "{{ item.0.kv_secret_name }}"
        --value "{{ (item.1.stdout | from_json).password }}"
        --expires "$(date -d '+1 year' -Iseconds)"
      loop: "{{ apps_to_rotate | zip(new_secrets.results) | list }}"
      no_log: true        # jamais de secret en clair dans les logs

    - name: "Health-check des consommateurs après rotation"
      ansible.builtin.uri:
        url: "{{ item.health_check_url }}"
      register: health
      loop: "{{ apps_to_rotate }}"
      until: health is succeeded
      retries: 5
      delay: 30
