# App Gateway peut accéder au tier frontend uniquement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
  namespace: althea-saas-prod
spec:
  podSelector:
    matchLabels: { tier: frontend }
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: 10.0.10.0/24 } # subnet App Gateway
      ports:
        - { protocol: TCP, port: 8080 }
