apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: althea-saas-prod
spec:
  podSelector:
    matchLabels: { tier: backend }
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 10.0.2.0/24 } }]    # PostgreSQL (subnet data)
      ports: [{ protocol: TCP, port: 5432 }]
    - to: [{ ipBlock: { cidr: 10.0.3.10/32 } }]   # Key Vault (Private Endpoint)
      ports: [{ protocol: TCP, port: 443 }]
    - to: [{ ipBlock: { cidr: 10.0.1.10/32 } }]   # Wazuh Manager
      ports: [{ protocol: TCP, port: 1514 }]
