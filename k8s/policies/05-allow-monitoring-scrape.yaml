# Prometheus (namespace monitoring) peut scraper les métriques
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: althea-saas-prod
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { name: monitoring }
      ports:
        - { protocol: TCP, port: 9090 }
        - { protocol: TCP, port: 9100 }
