# CronJob d'anonymisation HDS quotidien (02h CET)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hds-anonymizer
  namespace: althea-data-jobs
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels: { app: hds-anonymizer, dataclass: hds }
        spec:
          serviceAccountName: anonymizer-sa
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: anonymizer
              image: registry.althea-systems.fr/devops/hds-anonymizer:1.2.4
              imagePullPolicy: IfNotPresent
              resources:
                requests: { cpu: 500m, memory: 1Gi }
                limits:   { cpu: 2000m, memory: 4Gi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              env:
                - { name: SOURCE_DB_HOST, value: "psql-prod-saas-fr-01.postgres.database.azure.com" }
                - name: SOURCE_DB_USER
                  valueFrom: { secretKeyRef: { name: anonymizer-creds, key: source-readonly-user } }
                - { name: K_ANON_VALUE, value: "5" }
                - { name: TARGET_ENVS, value: "test,preprod" }
                - { name: BATCH_SIZE, value: "10000" }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
                - { name: workdir, mountPath: /work }
          volumes:
            - { name: tmp, emptyDir: { sizeLimit: 1Gi } }
            - { name: workdir, emptyDir: { sizeLimit: 10Gi } }
