<!-- Configuration de référence Wazuh Manager (extrait) -->
<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <email_notification>yes</email_notification>
    <email_to>soc@althea-systems.fr</email_to>
  </global>

  <cluster>
    <name>wazuh_althea</name>
    <node_name>WAZ-ALT-01</node_name>
    <node_type>master</node_type>
    <port>1516</port>
    <nodes>
      <node>10.0.1.10</node>  <!-- WAZ-ALT-01 master -->
      <node>10.0.1.11</node>  <!-- WAZ-ALT-02 worker -->
    </nodes>
  </cluster>

  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>1h</interval>
    <provider name="canonical"><enabled>yes</enabled><os>jammy</os></provider>
    <provider name="nvd"><enabled>yes</enabled><update_from_year>2020</update_from_year></provider>
  </vulnerability-detector>

  <integration>
    <name>shuffle</name>
    <hook_url>https://shuffle.althea-systems.fr/api/v1/hooks/webhook_xxx</hook_url>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>

  <syscheck>
    <frequency>21600</frequency>
    <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <directories check_all="yes" realtime="yes">/opt/althea-saas/config</directories>
  </syscheck>
</ossec_config>
